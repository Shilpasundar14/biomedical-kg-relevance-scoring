  <text class="st14" transform="translate(873.64 24)"><tspan x="0" y="0">Scoring criteria (per source)</tspan></text>
  <rect class="st19" x="660" y="44" width="290" height="54" rx="8" ry="8"/>
  <text class="st7" transform="translate(723.29 57)"><tspan x="0" y="0">A: Domain coverage (1-3)</tspan></text>
  <text class="st9" transform="translate(712.63 75)"><tspan x="0" y="0">Entity types, relation families, xrefs</tspan></text>
  <text class="st9" transform="translate(690.05 91)"><tspan x="0" y="0">e.g. drugs, targets, diseases; D-T, T-D, AE</tspan></text>
  <rect class="st22" x="970" y="44" width="290" height="54" rx="8" ry="8"/>
  <text class="st17" transform="translate(1045.35 57)"><tspan x="0" y="0">B: Source scope (1-3)</tspan></text>
  <text class="st11" transform="translate(1046.3 75)"><tspan x="0" y="0">Breadth, scale, modalities</tspan></text>
  <text class="st11" transform="translate(990.1 91)"><tspan x="0" y="0">e.g. cross-disease, multi-species, 100k+ edges</tspan></text>
  <rect class="st24" x="660" y="104" width="290" height="54" rx="8" ry="8"/>
  <text class="st12" transform="translate(699.58 117)"><tspan x="0" y="0">C: Utility for D↔D modelling (1-3)</tspan></text>
  <text class="st5" transform="translate(701.72 135)"><tspan x="0" y="0">Direct edges, direction/effect, evidence</tspan></text>
  <text class="st5" transform="translate(700.29 151)"><tspan x="0" y="0">e.g. inhibits, PMIDs, clean ID mappings</tspan></text>
  <rect class="st25" x="970" y="104" width="290" height="54" rx="8" ry="8"/>
  <text class="st8" transform="translate(1035.43 117)"><tspan x="0" y="0">D: Noise penalty (0 to -2)</tspan></text>
  <text class="st6" transform="translate(1024.3 135)"><tspan x="0" y="0">Text-mined, generic, low-precision</tspan></text>
  <text class="st6" transform="translate(1007.36 151)"><tspan x="0" y="0">≥85% → 0 | 70–85% → -1 | &lt;70% → -2</tspan></text>
